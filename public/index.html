<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#1D9E75" />
  <meta name="description" content="App kiểm kê hàng hóa offline-first" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Kiểm Kê" />
  <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
  <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
  <title>Kiểm Kê Hàng Hóa</title>
</head>
<body>
  <noscript>App cần JavaScript để chạy.</noscript>
  <div id="root"></div>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
          .then(reg => {
            console.log('[SW] Registered:', reg.scope)

            // Lắng nghe message từ SW (sync request)
            navigator.serviceWorker.addEventListener('message', event => {
              if (event.data?.type === 'SYNC_REQUESTED') {
                window.dispatchEvent(new Event('online'))
              }
            })
          })
          .catch(err => console.error('[SW] Error:', err))
      })
    }
  </script>
</body>
</html>
